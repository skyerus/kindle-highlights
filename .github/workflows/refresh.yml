name: Refresh highlights DB from Amazon

on:
  schedule:
    - cron: '0 3 * * 0'  # Sunday 3am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Scrape Amazon and merge into DB
        env:
          AMAZON_EMAIL: ${{ secrets.AMAZON_EMAIL }}
          AMAZON_PASSWORD: ${{ secrets.AMAZON_PASSWORD }}
          AMAZON_OTP_SECRET: ${{ secrets.AMAZON_OTP_SECRET }}
        run: python refresh.py

      - name: Commit highlights.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add highlights.json
          if git diff --cached --quiet; then
            echo "No new highlights to commit."
          else
            git commit -m "chore: refresh highlights from Amazon"
            git push
          fi

      - name: Upload debug screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3
