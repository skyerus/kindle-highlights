name: Daily Kindle Quote

on:
  schedule:
    - cron: '30 7 * * *'  # 7:30am UTC (7:30am GMT / 8:30am BST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-quote:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pick quote, render PNG, send to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Commit quote.png
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add quote.png
          if git diff --cached --quiet; then
            echo "No PNG change to commit."
          else
            git commit -m "chore: daily quote PNG"
            git push
          fi
